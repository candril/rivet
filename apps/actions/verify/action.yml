          }
          function skeleton2(humanId, input) {
            return `# ${humanId} · ${input.key} ${input.summary}
          
          **Status**: Draft
          
          #### Context
          
          TODO
          
          #### Requirement
          
          TODO
          
          #### Acceptance Criteria
          
          TODO
          
          #### Out of Scope
          
          TODO
