          }
          // ../../packages/core/src/mint.ts
          var GATE = new Set(["ready", "approved"]);
          // _src/verify.ts
          var root = process.env.RIVET_ROOT || ".";
          var config2 = loadConfig(root);
          var adapter = getAdapter(config2.adapter);
          var nodes = adapter.parse(root, config2.specs);
          var pr = context.payload.pull_request;
          var labels = (pr?.labels ?? []).map((l) => l.name);
