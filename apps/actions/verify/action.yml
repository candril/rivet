                return line.replace(/\s+$/, "");
            }
            return null;
          }
          function statusField(content) {
            const m = content.match(/^\s*\*\*Status\*\*:\s*(.+?)\s*$/m);
            return m ? m[1].trim().toLowerCase() : "";
          }
          function slugify(s) {
            return s.toLowerCase().replace(/[^\w\s-]/g, "").trim().replace(/\s+/g, "-").replace(/-+/g, "-").slice(0, 60) || "spec";
          }
          
          // ../../packages/core/src/adapters/lane.ts
          var NUM_PREFIX = /^(\d{3,})[-_]/;
          function laneKind(relPath) {
            return /(^|\/)nfr\//.test(relPath) ? "task" : "story";
          }
          var laneAdapter = {
            name: "lane",
            parse(root, specDirs) {
              const nodes = [];
              for (const f of readSpecFiles(root, specDirs)) {
                const h1 = firstH1(f.content) ?? "";
                const humanId = f.name.match(NUM_PREFIX)?.[1] ?? null;
                const { key, candidate, title } = parseH1(h1, humanId);
                nodes.push({
                  repoRelPath: f.relPath,
                  humanId,
                  key,
                  keyCandidate: candidate,
                  title,
                  kind: laneKind(f.relPath),
                  status: statusField(f.content),
                  h1Raw: h1
                });
              }
              return nodes;
            },
            scaffold(input, ctx) {
              const dir = input.kind === "task" ? ctx.specDirs.find((d) => /(^|\/)nfr$/.test(d)) ?? ctx.specDirs[0] : ctx.specDirs.find((d) => !/(^|\/)nfr$/.test(d)) ?? ctx.specDirs[0];
              const next = nextNumber(ctx, dir);
              return {
                path: `${dir}/${next}-${slugify(input.summary)}.md`,
                contents: skeleton(input)
              };
            }
          };
          function nextNumber(ctx, dir) {
            let max = 0;
            for (const n of ctx.existing) {
              if (!n.repoRelPath.startsWith(`${dir}/`))
                continue;
              const m = n.repoRelPath.slice(dir.length + 1).match(/^(\d{3,})/);
              if (m)
                max = Math.max(max, Number(m[1]));
            }
            return String(max + 1).padStart(3, "0");
          }
          function skeleton(input) {
            return `# ${input.key} ${input.summary}
          
          **Status**: Draft
          
          ## Description
          
          TODO
          
          ## Capabilities
          
          ### P1 — Must Have
          
          - TODO
          
          ## Out of Scope
          
          - TODO
          `;
          }
          
          // ../../packages/core/src/adapters/dg.ts
          var DG_NAME = /^ABO-(FR|NFR)-(\d{3,})_/;
          function dgKind(tag) {
            return tag === "FR" ? "story" : "task";
          }
          var dgAdapter = {
            name: "dg",
            parse(root, specDirs) {
              const nodes = [];
              for (const f of readSpecFiles(root, specDirs)) {
                const m = f.name.match(DG_NAME);
                if (!m)
                  continue;
                const humanId = `ABO-${m[1]}-${m[2]}`;
                const h1 = firstH1(f.content) ?? "";
                const { key, candidate, title } = parseH1(h1, humanId);
