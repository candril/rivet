              return true;
            if (v === "false")
              return false;
            const n = Number(v);
            return v !== "" && !Number.isNaN(n) ? n : v;
          }
          function splitTopLevel(s) {
            const out = [];
            let depth = 0;
            let inString = false;
            let quote = "";
            let cur = "";
            for (let i = 0;i < s.length; i++) {
              const c = s[i];
              if (inString) {
                cur += c;
                if (c === quote)
                  inString = false;
                continue;
              }
              if (c === '"' || c === "'") {
                inString = true;
                quote = c;
              } else if (c === "[") {
                depth++;
              } else if (c === "]") {
                depth--;
              } else if (c === "," && depth === 0) {
                out.push(cur);
                cur = "";
                continue;
              }
              cur += c;
            }
            if (cur.trim())
              out.push(cur);
            return out;
          }
          // ../../packages/core/src/adapters/shared.ts
          const { existsSync, readdirSync, readFileSync: readFileSync2 } = require("node:fs");
          const { join, relative } = require("node:path");
          function readSpecFiles(root, specDirs) {
            const out = [];
            for (const dir of specDirs) {
              const abs = join(root, dir);
              if (!existsSync(abs))
                continue;
              for (const entry of readdirSync(abs, { withFileTypes: true })) {
                if (!entry.isFile() || !entry.name.endsWith(".md"))
                  continue;
                const absPath = join(abs, entry.name);
                out.push({
                  absPath,
                  relPath: relative(root, absPath).replace(/\\/g, "/"),
                  content: readFileSync2(absPath, "utf8"),
                  name: entry.name,
                  dir
                });
