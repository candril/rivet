name: "rivet verify"
description: "Gate PRs on Jira-key format, uniqueness, and immutability."
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.3"
    - shell: bash
      run: bun install --frozen-lockfile
    - shell: bash
      # GITHUB_BASE_REF lets verify diff against the PR base for immutability;
      # RIVET_PR_LABELS carries the `allow-key-change` escape hatch.
      env:
        GITHUB_BASE_REF: ${{ github.base_ref }}
        RIVET_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
      run: |
        git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
        bun run apps/cli/src/main.ts verify .
