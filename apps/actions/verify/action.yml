name: 'rivet verify'
description: 'Gate PRs on Jira-key format, uniqueness, and immutability (the key in each spec H1).'
author: 'candril'

inputs:
  path:
    description: 'Repo-relative root containing rivet.toml'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Verify specs
      uses: actions/github-script@v7
      env:
        RIVET_ROOT: ${{ inputs.path }}
      with:
        script: |
          // !! GENERATED — edit apps/actions/_src/verify.ts instead !!
          // ../../packages/core/src/keys.ts
