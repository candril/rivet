          }
          function firstH1(content) {
            let inCode = false;
            for (const line of content.split(`
          `)) {
              if (line.trimStart().startsWith("```")) {
                inCode = !inCode;
                continue;
              }
              if (inCode)
                continue;
              if (/^#\s+/.test(line))
                return line.replace(/\s+$/, "");
