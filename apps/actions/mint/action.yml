                const body = await res.json().catch(() => null);
                const msg = body?.errorMessages?.join("; ") || body?.errors && Object.values(body.errors).join("; ") || res.statusText;
                throw new JiraError(res.status, msg);
              }
              return res.json();
            }
          }
          function toIssue(w) {
            return {
              key: w.key,
              type: w.fields.issuetype.name,
              summary: w.fields.summary,
              statusCategory: w.fields.status?.statusCategory?.key ?? "unknown"
            };
          }
          // ../../packages/core/src/config.ts
          const { readFileSync } = require("node:fs");
          const { resolve } = require("node:path");
          function loadConfig(root = ".") {
            const path = resolve(root, "rivet.toml");
            return validateConfig(parseToml(readFileSync(path, "utf8")), path);
          }
          function validateConfig(raw, source = "rivet.toml") {
            const fail = (m) => {
              throw new Error(`${source}: ${m}`);
            };
            if (typeof raw.adapter !== "string")
              fail("`adapter` must be a string");
            if (!Array.isArray(raw.specs) || raw.specs.some((s) => typeof s !== "string")) {
              fail("`specs` must be an array of strings");
            }
            if (typeof raw.project !== "string")
              fail("`project` must be a string");
            const baseUrl = process.env.JIRA_BASE_URL ?? raw.base_url;
            if (typeof baseUrl !== "string" || !baseUrl) {
              fail("`base_url` must be set in rivet.toml (or JIRA_BASE_URL in the env)");
            }
            const types2 = raw.types ?? {};
            return {
              adapter: raw.adapter,
              specs: raw.specs,
              project: raw.project,
              baseUrl,
              types: {
                story: typeof types2.story === "string" ? types2.story : "Story",
                task: typeof types2.task === "string" ? types2.task : "Task"
