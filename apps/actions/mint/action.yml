name: 'rivet mint'
description: 'Preview keyless specs; on the create-jira label, create Jira issues and stamp their keys back to the PR branch.'
author: 'candril'

inputs:
  path:
    description: 'Repo-relative root containing rivet.toml'
    required: false
    default: '.'
  jira-email:
    description: 'Jira account email (Basic auth)'
    required: true
  jira-api-token:
    description: 'Jira API token (Basic auth) — use a service-account secret'
    required: true
  jira-base-url:
    description: 'Jira base URL; overrides rivet.toml base_url when set'
    required: false
    default: ''
  label-issues:
    description: 'Also add a rivet:<repo>/<id> label to each created issue'
    required: false
    default: 'false'
  github-token:
    description: 'Token for PR comments, label removal, and pushing the stamp commit'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Mint specs
      uses: actions/github-script@v7
      env:
        RIVET_ROOT: ${{ inputs.path }}
        JIRA_EMAIL: ${{ inputs.jira-email }}
        JIRA_API_TOKEN: ${{ inputs.jira-api-token }}
        JIRA_BASE_URL: ${{ inputs.jira-base-url }}
        RIVET_LABEL: ${{ inputs.label-issues }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          // !! GENERATED — edit apps/actions/_src/mint.ts instead !!
          // _src/mint.ts
          const { readFileSync: readFileSync3, writeFileSync } = require("node:fs");
          const { execFileSync } = require("node:child_process");
          const { join: join2 } = require("node:path");
          // ../../packages/core/src/keys.ts
          var KEY_SOURCE = "[A-Z][A-Z0-9]+-\\d+";
          var KEY_REGEX = new RegExp(`^${KEY_SOURCE}$`);
          var KEY_IN_TEXT = new RegExp(`(?<![A-Za-z0-9-])(${KEY_SOURCE})(?![A-Za-z0-9-])`);
          function firstKey(text) {
            const m = text.match(KEY_IN_TEXT);
            return m ? m[1] : null;
          }
          var SEP = "[\\s.:·\\-–—]+";
          var KEYISH = /^[A-Za-z][A-Za-z0-9]*-[A-Za-z0-9.]*\d/;
          function parseH1(h1Raw, humanId) {
            const heading = h1Raw.replace(/^#+\s*/, "").trim();
            const key = firstKey(heading);
            let afterId = heading;
            if (humanId && afterId.startsWith(humanId)) {
              afterId = afterId.slice(humanId.length).replace(new RegExp(`^\\s*${SEP}`), "");
            }
            const firstTok = afterId.match(/^(\S+)/)?.[1];
            let candidate = null;
            if (firstTok) {
              const clean = firstTok.replace(/[^A-Za-z0-9.]+$/, "");
              if (KEYISH.test(clean))
                candidate = clean;
            }
            let title = heading;
            if (humanId && title.startsWith(humanId)) {
              title = title.slice(humanId.length).replace(new RegExp(`^\\s*${SEP}`), "");
            }
            if (key && title.startsWith(key)) {
              title = title.slice(key.length).replace(new RegExp(`^\\s*${SEP}`), "");
            }
            title = title.trim() || heading;
            return { key, candidate, title };
          }
          function stampKey(h1Raw, key, humanId) {
            const { title } = parseH1(h1Raw, humanId);
            const head = humanId ? `${humanId} · ${key}` : key;
            return `# ${head}${title ? ` ${title}` : ""}`;
          }
          // ../../packages/core/src/jira.ts
          class JiraError extends Error {
            status;
            constructor(status, message) {
              super(message);
              this.status = status;
              this.name = "JiraError";
            }
          }
          var sleep = (ms) => new Promise((r) => setTimeout(r, ms));
          
          class JiraClient {
            baseUrl;
            auth;
            fetch;
            maxRetries;
            constructor(opts) {
              this.baseUrl = opts.baseUrl.replace(/\/$/, "");
              this.auth = `Basic ${btoa(`${opts.email}:${opts.token}`)}`;
              this.fetch = opts.fetch ?? globalThis.fetch.bind(globalThis);
              this.maxRetries = opts.maxRetries ?? 3;
            }
            async createIssue(input) {
              const res = await this.request("/rest/api/3/issue", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  fields: {
                    project: { key: input.projectKey },
                    issuetype: { name: input.type },
                    summary: input.summary
                  }
                })
              });
              const body = await this.json(res);
              return { key: body.key, url: `${this.baseUrl}/browse/${body.key}` };
            }
            async getIssue(key) {
              const res = await this.request(`/rest/api/3/issue/${encodeURIComponent(key)}?fields=summary,issuetype,status`, { method: "GET" });
