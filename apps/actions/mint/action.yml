                out.push(cur);
                cur = "";
                continue;
              }
              cur += c;
            }
            if (cur.trim())
              out.push(cur);
            return out;
          }
          // ../../packages/core/src/adapters/shared.ts
          const { existsSync, readdirSync, readFileSync: readFileSync2 } = require("node:fs");
          const { join, relative } = require("node:path");
